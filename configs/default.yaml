project:
  name: AI Story Factory
  version: "0.2.0"

paths:
  input_dir: data/input
  output_dir: data/output
  cache_dir: data/cache
  model_root: /home/nikith/Models

render:
  aspect_ratio: "16:9"
  resolution: "1920x1080"
  fps: 30
  codec: "libx264"
  crf: 23
  preset: "veryfast"

video:
  target_duration_seconds: 60
  average_scene_duration_seconds: 6
  image_motion: true

subtitles:
  embed: true
  font_name: "Arial"
  font_size: 54
  position: "bottom_center"
  color: "white"
  outline_color: "black"
  max_lines: 3
  max_chars_per_line: 42
  provider: "placeholder"

audio:
  voice_provider: "kokoro"
  narration_volume: 1.0
  music_volume: 0.08
  cache_enabled: true
  overwrite_existing: false
  sample_rate: 24000
  voice_name: "af_heart"
  model_name: "kokoro"
  lang_code: "a"
  repo_id: "hexgrad/Kokoro-82M"
  
images:
  provider: "local_ai"
  style: "cinematic anime fantasy"
  width: 1024
  height: 576
  steps: 4
  guidance_scale: 0.0
  seed: 12345
  device: "cuda"
  dtype: "float16"
  model_name: "sdxl-turbo"
  model_path: "stabilityai/sdxl-turbo"
  cache_enabled: true
  overwrite_existing: false

cache:
  enabled: true
  prompt_hashing: true
  skip_existing: true

logging:
  level: INFO
  save_logs: true

pipeline:
  continue_on_scene_failure: true
  resume_enabled: true
motion:
  provider: "ken_burns"
  enabled: true
